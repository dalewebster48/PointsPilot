<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Date range input · paged</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #ECECEE;
    font-family: -apple-system, system-ui, 'Segoe UI', sans-serif; color: #111; }
  * { box-sizing: border-box; }
  @keyframes summFade {
    0%   { opacity: 0; transform: translateY(4px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes hintSwap {
    0%   { opacity: 0; transform: translateY(-2px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  button { font-family: inherit; -webkit-tap-highlight-color: transparent; }
  button:focus-visible { outline: 2px solid #FF6B4A; outline-offset: 2px; }
  .dates-scroll::-webkit-scrollbar { display: none; }
</style>
<script>window.__ACCENT__ = '#FF6B4A';</script>
</head>
<body>
<div style="min-height:100vh; display:grid; place-items:center; padding: 20px 0;">
  <div id="device-mount"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="date-range-paged.jsx"></script>

<script type="text/babel" data-presets="env,react">
function Mount() {
  return (
    <IOSDevice width={390} height={844}>
      <App />
    </IOSDevice>
  );
}
ReactDOM.createRoot(document.getElementById('device-mount')).render(<Mount />);
</script>
</body>
</html>
